name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: config/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt
          pip install pyinstaller

      - name: Create build .env from secret
        shell: pwsh
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if (-not $env:OPENROUTER_API_KEY) {
            throw "GitHub secret OPENROUTER_API_KEY is not configured."
          }
          New-Item -ItemType Directory -Path config -Force | Out-Null
          "OPENROUTER_API_KEY=$env:OPENROUTER_API_KEY" | Out-File -FilePath config\.env -Encoding utf8 -NoNewline

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build exe and installer
        shell: pwsh
        run: .\config\build.ps1

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = python -c "import sys; sys.path.insert(0, 'config'); from load_version import load_version; print(load_version())"
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ChatList v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/release/*
            dist/ChatList-${{ steps.version.outputs.value }}-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
